    <header>
        <div id="note">
            <p id="note_t">Made Fresh Daily</p>
        </div>

        <nav>

            <!--to add the nav bar-->
            <div class="navbar">

                <a href="index.html">
                    <img src="images/logo.png" class="logo" alt="logo">
                </a>

                <a class="menuLinks" href="index.html">Home</a>

                <a class="menuLinks" href="about.html">About</a>

                <div class="menuLinks dropdown">Shop
                    <div class="dropContent">
                        <a class="dropLinks" href="coffee.html">Coffee</a>
                        <a class="dropLinks" href="bagels.html">Bagels</a>
                        <a class="dropLinks" href="sweets.html">Sweets</a>
                    </div>
                </div>

                <a class="menuLinks" href="contact.html">Contact</a>

                <div class="rightNav">
                    <img src="images/cart.png" class="cartPic" alt="cart">

                    <a href="login.html">
                        <img src="images/user.png" class="logPic" alt="user icon">
                    </a>
                </div>
            </div>

        </nav>

    </header>


    <article>
        <h2 id="Contacttext">Contact us!</h2>

        <div class="Addresscontanier">
            <h1 class="Ad-text">Address</h1>
            <div id="Ad-info-box">
                <div class="Ad-info-box2">
                    <p class="Ad-info-text">Juffair, Fontana Tower</p>
                    <p class="Ad-info-text">For delivery - talabat, Ahlan and Jahez</p>
                    <p class="Ad-info-text">Phone:+973 13303020</p>
                </div>
            </div>
        </div>

        <form>
            <div class="formdiv">
                <h1 class="AnyQuestion-text">Any Question</h1>
                <div class="overall-box">
                    <div class="text-box">
                        <label>Name:
                            <input type="text" class="text-area1" name="name" autocomplete="name"></label>
                    </div>

                    <div class="text-box">
                        <label>Phone:
                            <input type="text" name="phone" class="text-area2" autocomplete="phone"></label>
                    </div>

                    <div class="text-box">
                        <label>Email Address:
                            <input type="text" name="email" class="text-area3" autocomplete="name"></label>
                    </div>

                    <div class="text-box">
                        <label>Message:
                            <textarea rows="5" class="text-area" cols="60" name="message"></textarea></label>
                    </div>

                    <div>
                        <button type="submit" class="button" value="submit" onclick="handleClick4()">Submit</button>
                    </div>
                </div>
            </div>
        </form>
        <div id="contactimg"></div>
    </article>


    <!-- Footer -->

    <footer>
