<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Rabab, Maria, Tahera">
    <meta name="description" content="Warm bagels and fresh brews!">
    <meta name="keywords" content="Bagels, Coffee,  Sweet, Savory, bahrain">
    <link rel="icon" href="images/logo2.png">
    <link rel="stylesheet" href="style.css">

    <title>login</title>
</head>

<body>
    <header>
        <div id="note">
            <p id="note_t">Made Fresh Daily</p>
        </div>

        <nav>

            <!--to add the nav bar-->
            <div class="navbar">

                <a href="index.html">
                    <img src="images/logo.png" class="logo" alt="logo">
                </a>

                <a class="menuLinks" href="index.html">Home</a>

                <a class="menuLinks" href="about.html">About</a>

                <div class="menuLinks dropdown">Shop
                    <div class="dropContent">
                        <a class="dropLinks" href="coffee.html">Coffee</a>
                        <a class="dropLinks" href="bagels.html">Bagels</a>
                        <a class="dropLinks" href="sweets.html">Sweets</a>
                    </div>
                </div>

                <a class="menuLinks" href="contact.html">Contact</a>

                <div class="rightNav">
                    <img src="images/cart.png" class="cartPic" alt="cart">

                    <a href="login.html">
                        <img src="images/user.png" class="logPic" alt="user icon">
                    </a>
                </div>
            </div>

        </nav>

    </header>

    <main>
        <!--adding a div for the page-->
        <div id="main_login">



            <!--adding a div for the form -->
            <div class="wrapper">
                <!--adding a close icon-->
                <span class="icon-close"><ion-icon name="close"></ion-icon></span>

                <!--div for the login form-->
                <div class="form-box-login">

                    <!--heading-->
                    <h2>Login</h2>

                    <!--form inputs , user name , email , password , button ,checkbox-->
                    <form action="#">
                        <form action="#">
                            <div class="input-box">
                                <span class="icon"><ion-icon name="person"></ion-icon></span>
                                <input type="text" required>
                                <label for="">Username</label>
                            </div>

                            <div class="input-box">
                                <span class="icon"><ion-icon name="mail"></ion-icon></span>
                                <input type="email" required>
                                <label for="">Email</label>
                            </div>

                            <div class="input-box">
                                <span class="icon"><ion-icon name="lock-closed"></ion-icon> </span>
                                <input type="password" required>
                                <label for="">Password</label>
                            </div>

                            <div class="remember-forgot">
                                <label><input type="checkbox">Remember me</label>
                                <a href="#">Forgot Password? </a>
                            </div>
                            <button type="submit" class="btn">Login</button>

                </div>

                </form>
            </div>
    </main>

    <!-- Footer -->

    <footer>

        <a href="https://www.instagram.com/tgab.bh/">

            <img src="images/instagram.png" class="icons" alt="instagram">
        </a>

        <p>The Great American Bagel 2026 © All Rights Reserved.</p>

    </footer>
    <script src="script.js"></script>

</body>

</html>
